body:
  text: 神龕乙未八月己亥癸巳為皇帝陛下七世父母所生父母一切衆生告訖夫大聖幽微以虛寂為旨生成萬物功不在己纖萇通微咸無不周大聖如味而研之者明至言若訥尋之者辨當今皇帝御世万邦斯順善化垂範群迷心返伏聞一念之善獲無盡之功一米投廚致恆沙之果是以張安世體識虛空識真正法減割家珍張安世人身造石像一區上願帝主康寧祚延無窮若洛三徒不徑八難下願張安世人身家眷合無大小無病少痛延年益壽宅舍全鋼來財宜寶用之無盡所願從心祖張豐洛父周慶叔父雙慶兄文虯兄文清兄賢黃名安世息還洛息阿僧息僧歡妻李男異妾王阿引息富洛息雙富姪阿洛姪阿歡姪阿奴姪天還姪似仁姪德仁姪歡
